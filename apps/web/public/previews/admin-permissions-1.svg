<svg xmlns="http://www.w3.org/2000/svg" width="540" height="960" viewBox="0 0 540 960" role="img" aria-labelledby="title desc">
  <title id="title">Админы. Вариант 1. Список и быстрые права</title>
  <desc id="desc">Макет раздела администраторов со списком слева и быстрым управлением доступом справа.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef7fb"/>
      <stop offset="1" stop-color="#d9edf7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#52728a" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="540" height="960" rx="34" fill="url(#bg)"/>
  <g font-family="Inter, Arial, sans-serif" fill="#102033">
    <rect x="22" y="24" width="496" height="116" rx="24" fill="#ffffff" stroke="#c6dce8"/>
    <text x="46" y="70" font-size="30" font-weight="900">Админы</text>
    <text x="46" y="102" font-size="16" font-weight="700" fill="#61758a">Список, статус доступа и быстрые права.</text>
    <rect x="358" y="52" width="136" height="48" rx="18" fill="#1687b7"/>
    <text x="388" y="82" font-size="16" font-weight="900" fill="#ffffff">Добавить</text>

    <rect x="22" y="164" width="496" height="704" rx="26" fill="#ffffff" stroke="#c6dce8" filter="url(#shadow)"/>
    <text x="46" y="210" font-size="20" font-weight="900">Команда админов</text>
    <text x="334" y="210" font-size="14" font-weight="800" fill="#687b8f">3 активны · 1 выключен</text>

    <rect x="46" y="236" width="448" height="104" rx="22" fill="#e8f5fb" stroke="#aacfe1"/>
    <circle cx="82" cy="288" r="24" fill="#1f9fd0"/>
    <text x="73" y="297" font-size="23" font-weight="900" fill="#ffffff">И</text>
    <text x="124" y="276" font-size="18" font-weight="900">Иван</text>
    <text x="124" y="302" font-size="14" font-weight="750" fill="#637589">Главный админ · @ivan</text>
    <rect x="350" y="262" width="112" height="36" rx="18" fill="#dff4e8"/>
    <text x="376" y="285" font-size="14" font-weight="900" fill="#24734c">Доступ есть</text>

    <rect x="46" y="356" width="448" height="104" rx="22" fill="#f8fbfd" stroke="#d4e4ec"/>
    <circle cx="82" cy="408" r="24" fill="#e5f3fb"/>
    <text x="73" y="417" font-size="23" font-weight="900" fill="#1783ad">К</text>
    <text x="124" y="396" font-size="18" font-weight="900">Катя</text>
    <text x="124" y="422" font-size="14" font-weight="750" fill="#637589">Поддержка · последние 2 часа</text>
    <rect x="350" y="382" width="112" height="36" rx="18" fill="#dff4e8"/>
    <text x="376" y="405" font-size="14" font-weight="900" fill="#24734c">Доступ есть</text>

    <rect x="46" y="476" width="448" height="104" rx="22" fill="#fff9ef" stroke="#ead6ad"/>
    <circle cx="82" cy="528" r="24" fill="#ffe4a7"/>
    <text x="73" y="537" font-size="23" font-weight="900" fill="#8a6218">М</text>
    <text x="124" y="516" font-size="18" font-weight="900">Марина</text>
    <text x="124" y="542" font-size="14" font-weight="750" fill="#76684e">Контент · надо проверить права</text>
    <rect x="344" y="502" width="126" height="36" rx="18" fill="#ffe9c0"/>
    <text x="370" y="525" font-size="14" font-weight="900" fill="#8a6218">Ограничен</text>

    <rect x="46" y="610" width="448" height="216" rx="24" fill="#f7fbfd" stroke="#d4e4ec"/>
    <text x="70" y="652" font-size="18" font-weight="900">Быстрые действия</text>
    <rect x="70" y="676" width="186" height="48" rx="18" fill="#dff4e8" stroke="#9dd7b8"/>
    <text x="108" y="706" font-size="15" font-weight="900" fill="#24734c">Выдать доступ</text>
    <rect x="270" y="676" width="186" height="48" rx="18" fill="#ffe6e8" stroke="#f0b0b8"/>
    <text x="308" y="706" font-size="15" font-weight="900" fill="#b33a4a">Забрать доступ</text>

    <text x="70" y="762" font-size="14" font-weight="850" fill="#637589">Права выбранного админа</text>
    <rect x="70" y="782" width="90" height="28" rx="14" fill="#dff4e8"/>
    <text x="92" y="801" font-size="12" font-weight="900" fill="#24734c">Клиенты</text>
    <rect x="168" y="782" width="94" height="28" rx="14" fill="#dff4e8"/>
    <text x="190" y="801" font-size="12" font-weight="900" fill="#24734c">Оплаты</text>
    <rect x="270" y="782" width="110" height="28" rx="14" fill="#e4f1f8"/>
    <text x="291" y="801" font-size="12" font-weight="900" fill="#1d7198">Контент</text>
    <rect x="388" y="782" width="70" height="28" rx="14" fill="#f0f4f7"/>
    <text x="405" y="801" font-size="12" font-weight="900" fill="#637589">S3</text>

    <text x="46" y="906" font-size="13" font-weight="800" fill="#6b7e90">Идея: быстро включать доступ и видеть ключевые права без входа в карточку.</text>
  </g>
</svg>

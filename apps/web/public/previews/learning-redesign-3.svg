<svg xmlns="http://www.w3.org/2000/svg" width="540" height="960" viewBox="0 0 540 960" role="img" aria-labelledby="title desc">
  <title id="title">Вариант 3. Библиотека</title>
  <desc id="desc">Макет раздела обучения в формате библиотеки с фильтрами по типам контента.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14110f"/>
      <stop offset="1" stop-color="#3b2b22"/>
    </linearGradient>
    <linearGradient id="coffee" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6f4a35"/>
      <stop offset="1" stop-color="#2a1c17"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f4b977"/>
      <stop offset="1" stop-color="#df7f3d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".30"/>
    </filter>
  </defs>
  <rect width="540" height="960" rx="34" fill="url(#bg)"/>
  <g font-family="Inter, Arial, sans-serif" fill="#fff8f0">
    <rect x="24" y="28" width="492" height="118" rx="28" fill="#221916" stroke="#65432f"/>
    <text x="48" y="74" font-size="28" font-weight="900">Обучение</text>
    <text x="48" y="104" font-size="15" font-weight="740" fill="#c0a390">Быстрый поиск нужного контента.</text>
    <text x="418" y="82" font-size="15" font-weight="900" fill="#f2b677">Вариант 3</text>

    <rect x="24" y="170" width="492" height="58" rx="22" fill="#1b1412" stroke="#5b3b2b"/>
    <text x="50" y="206" font-size="16" font-weight="700" fill="#a99082">Поиск по урокам, аудио и заметкам</text>

    <g transform="translate(24 250)">
      <rect width="98" height="42" rx="21" fill="url(#accent)"/>
      <text x="31" y="27" font-size="14" font-weight="900" fill="#21130d">Все</text>
      <rect x="112" width="98" height="42" rx="21" fill="#241a16" stroke="#634431"/>
      <text x="139" y="27" font-size="14" font-weight="800" fill="#d7beac">Видео</text>
      <rect x="224" width="98" height="42" rx="21" fill="#241a16" stroke="#634431"/>
      <text x="253" y="27" font-size="14" font-weight="800" fill="#d7beac">Аудио</text>
      <rect x="336" width="98" height="42" rx="21" fill="#241a16" stroke="#634431"/>
      <text x="369" y="27" font-size="14" font-weight="800" fill="#d7beac">Текст</text>
    </g>

    <g transform="translate(24 322)">
      <rect width="492" height="150" rx="28" fill="url(#coffee)" stroke="#80573d" filter="url(#shadow)"/>
      <rect x="22" y="24" width="102" height="102" rx="22" fill="#120d0b"/>
      <circle cx="73" cy="75" r="31" fill="#f7e2cf"/>
      <path d="M62 54 L62 96 L96 75 Z" fill="#2a1710"/>
      <text x="146" y="50" font-size="21" font-weight="900">Курс-плейлист</text>
      <text x="146" y="78" font-size="14" font-weight="730" fill="#dfc4ae">Смотреть уроки подряд, как подборку.</text>
      <rect x="146" y="101" width="170" height="8" rx="4" fill="#5e4335"/>
      <rect x="146" y="101" width="94" height="8" rx="4" fill="url(#accent)"/>
      <text x="332" y="108" font-size="13" font-weight="850" fill="#f2b677">3 из 8</text>
    </g>

    <text x="30" y="530" font-size="22" font-weight="900">Свежий контент</text>
    <g transform="translate(24 556)">
      <rect width="492" height="86" rx="22" fill="#211815" stroke="#604231"/>
      <rect x="18" y="17" width="52" height="52" rx="16" fill="#34241d"/>
      <text x="36" y="51" font-size="22">▶</text>
      <text x="92" y="35" font-size="18" font-weight="900">Милый котик</text>
      <text x="92" y="61" font-size="13" font-weight="730" fill="#c0a390">Видео · 14 минут · открыто</text>
      <text x="442" y="53" font-size="24" font-weight="900" fill="#f2b677">›</text>
    </g>
    <g transform="translate(24 660)">
      <rect width="492" height="86" rx="22" fill="#211815" stroke="#604231"/>
      <rect x="18" y="17" width="52" height="52" rx="16" fill="#34241d"/>
      <text x="36" y="51" font-size="22">♪</text>
      <text x="92" y="35" font-size="18" font-weight="900">Голосовой тест</text>
      <text x="92" y="61" font-size="13" font-weight="730" fill="#c0a390">Аудио · 7 минут · заметки</text>
      <text x="442" y="53" font-size="24" font-weight="900" fill="#f2b677">›</text>
    </g>
    <g transform="translate(24 764)">
      <rect width="492" height="86" rx="22" fill="#211815" stroke="#604231"/>
      <rect x="18" y="17" width="52" height="52" rx="16" fill="#34241d"/>
      <text x="36" y="51" font-size="22">T</text>
      <text x="92" y="35" font-size="18" font-weight="900">Конспект и ссылки</text>
      <text x="92" y="61" font-size="13" font-weight="730" fill="#c0a390">Текст · 4 минуты</text>
      <text x="442" y="53" font-size="24" font-weight="900" fill="#f2b677">›</text>
    </g>
  </g>
</svg>

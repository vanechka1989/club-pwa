<svg xmlns="http://www.w3.org/2000/svg" width="540" height="960" viewBox="0 0 540 960" role="img" aria-labelledby="title desc">
  <title id="title">Вариант 2. Модули и уроки</title>
  <desc id="desc">Макет раздела обучения с модульными карточками и компактным списком уроков.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5fbf8"/>
      <stop offset="1" stop-color="#dcefe8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0b8f66"/>
      <stop offset="1" stop-color="#4bbf9e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#0a3a2b" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="540" height="960" rx="34" fill="url(#bg)"/>
  <g font-family="Inter, Arial, sans-serif" fill="#10231d">
    <rect x="20" y="28" width="500" height="110" rx="28" fill="#ffffff" stroke="#c7ddd5" filter="url(#shadow)"/>
    <text x="44" y="72" font-size="28" font-weight="900">Обучение</text>
    <text x="44" y="102" font-size="15" font-weight="750" fill="#61766e">Модули, уроки и прогресс без лишнего шума.</text>
    <circle cx="468" cy="82" r="31" fill="#e3f6ef"/>
    <text x="451" y="91" font-size="18" font-weight="900" fill="#0c8b64">50%</text>

    <rect x="20" y="166" width="500" height="142" rx="26" fill="#e8f7f1" stroke="#bdd9cf"/>
    <text x="44" y="208" font-size="16" font-weight="800" fill="#61766e">Вариант 2</text>
    <text x="44" y="244" font-size="30" font-weight="900">Модули и уроки</text>
    <rect x="44" y="270" width="452" height="10" rx="5" fill="#c9e4dc"/>
    <rect x="44" y="270" width="226" height="10" rx="5" fill="url(#green)"/>

    <g transform="translate(20 342)">
      <rect width="500" height="172" rx="26" fill="#ffffff" stroke="#c6ded5" filter="url(#shadow)"/>
      <text x="24" y="40" font-size="13" font-weight="900" fill="#0b8f66">Модуль 1</text>
      <text x="24" y="72" font-size="24" font-weight="900">База клуба</text>
      <text x="24" y="100" font-size="14" font-weight="700" fill="#6d8179">3 урока · 2 пройдено</text>
      <rect x="330" y="34" width="136" height="44" rx="22" fill="#e5f7f0"/>
      <text x="359" y="62" font-size="14" font-weight="900" fill="#0b8f66">Продолжить</text>
      <g transform="translate(24 118)">
        <circle cx="12" cy="12" r="12" fill="#0b8f66"/>
        <text x="8" y="17" font-size="13" font-weight="900" fill="#fff">✓</text>
        <text x="42" y="17" font-size="15" font-weight="800">Старт</text>
        <circle cx="190" cy="12" r="12" fill="#0b8f66"/>
        <text x="186" y="17" font-size="13" font-weight="900" fill="#fff">✓</text>
        <text x="220" y="17" font-size="15" font-weight="800">Котик</text>
      </g>
    </g>

    <g transform="translate(20 536)">
      <rect width="500" height="246" rx="26" fill="#ffffff" stroke="#c6ded5" filter="url(#shadow)"/>
      <text x="24" y="42" font-size="13" font-weight="900" fill="#0b8f66">Модуль 2</text>
      <text x="24" y="74" font-size="24" font-weight="900">Практика</text>
      <text x="24" y="101" font-size="14" font-weight="700" fill="#6d8179">4 урока · новый контент</text>
      <g transform="translate(24 124)">
        <rect width="452" height="54" rx="18" fill="#f2fbf7" stroke="#d4e8e0"/>
        <rect x="14" y="11" width="32" height="32" rx="11" fill="#dff5ec"/>
        <text x="24" y="34" font-size="18">▶</text>
        <text x="62" y="25" font-size="15" font-weight="850">Разбор видео</text>
        <text x="62" y="44" font-size="12" font-weight="700" fill="#73877f">Видео · 12 минут</text>
      </g>
      <g transform="translate(24 188)">
        <rect width="452" height="54" rx="18" fill="#f2fbf7" stroke="#d4e8e0"/>
        <rect x="14" y="11" width="32" height="32" rx="11" fill="#dff5ec"/>
        <text x="24" y="34" font-size="18">♪</text>
        <text x="62" y="25" font-size="15" font-weight="850">Голосовая практика</text>
        <text x="62" y="44" font-size="12" font-weight="700" fill="#73877f">Аудио · заметки</text>
      </g>
    </g>

    <g transform="translate(20 814)">
      <rect width="500" height="92" rx="26" fill="#0f8d65"/>
      <text x="26" y="38" font-size="18" font-weight="900" fill="#fff">Следующий шаг</text>
      <text x="26" y="64" font-size="14" font-weight="750" fill="#dff8f0">Откройте “Разбор видео”, чтобы продолжить.</text>
      <text x="456" y="58" font-size="32" font-weight="900" fill="#fff">›</text>
    </g>
  </g>
</svg>

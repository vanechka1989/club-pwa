server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; worker-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https: wss:; frame-src https://www.youtube.com https://youtube.com https://www.youtube-nocookie.com; manifest-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), geolocation=(), payment=(), usb=(), serial=(), bluetooth=()" always;

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files /index.html =404;
  }

  location = /manifest.webmanifest {
    types {
      application/manifest+json webmanifest;
    }
    default_type application/manifest+json;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files /manifest.webmanifest =404;
  }

  location = /sw.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Service-Worker-Allowed "/" always;
    try_files /sw.js =404;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location /go/ {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files $uri $uri/ /index.html;
  }

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }
}

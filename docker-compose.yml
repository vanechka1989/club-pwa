services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: club
      POSTGRES_PASSWORD: club
      POSTGRES_DB: club
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U club -d club"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:

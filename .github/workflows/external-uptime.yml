name: External uptime

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: external-uptime
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - id: check
        name: Check public endpoints
        continue-on-error: true
        run: bash scripts/check-public-uptime.sh
      - name: Open or update incident
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[monitor] Club PWA недоступно';
            async function findOpenIncident() {
              const issues = await github.paginate(github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100
              });
              return issues.find((issue) => issue.title === title);
            }
            const existing = await findOpenIncident();
            const body = `Внешняя проверка web/API не прошла. Запуск: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            if (existing) {
              await github.rest.issues.createComment({ ...context.repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ ...context.repo, title, body });
            }
      - name: Close recovered incident
        if: steps.check.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[monitor] Club PWA недоступно';
            async function findOpenIncident() {
              const issues = await github.paginate(github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100
              });
              return issues.find((issue) => issue.title === title);
            }
            const existing = await findOpenIncident();
            if (existing) {
              await github.rest.issues.createComment({ ...context.repo, issue_number: existing.number, body: 'Сервис снова отвечает; инцидент закрыт автоматически.' });
              await github.rest.issues.update({ ...context.repo, issue_number: existing.number, state: 'closed' });
            }
      - name: Mark outage check as failed
        if: steps.check.outcome == 'failure'
        run: exit 1

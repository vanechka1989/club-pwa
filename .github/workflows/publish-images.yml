name: Публикация образов шаблонного клуба

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: template-images
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: apps/api/Dockerfile
            image: ghcr.io/vanechka1989/club-pwa-api
          - service: web
            dockerfile: apps/web/Dockerfile
            image: ghcr.io/vanechka1989/club-pwa-web

    steps:
      - name: Забрать код
        uses: actions/checkout@v4

      - name: Подготовить Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Войти в GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Собрать и опубликовать ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

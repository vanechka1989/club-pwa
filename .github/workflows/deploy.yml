name: Deploy to VPS

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Configure SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Update application
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          set -euo pipefail
          ssh_args=(
            -i ~/.ssh/deploy_key
            -o IdentitiesOnly=yes
            -o ServerAliveInterval=20
            -o ServerAliveCountMax=30
            -p "$SERVER_PORT"
            "$SERVER_USER@$SERVER_HOST"
          )

          if ! ssh "${ssh_args[@]}" "DEPLOY_DIR='$DEPLOY_DIR' bash '$DEPLOY_DIR/deploy/update.sh'"; then
            echo "Deployment command failed. Collecting remote diagnostics..." >&2
            ssh "${ssh_args[@]}" "
              DEPLOY_DIR='$DEPLOY_DIR' bash '$DEPLOY_DIR/deploy/status.sh' || true
              journalctl -u club-pwa-deploy.service --no-pager -n 200 || true
              cd '$DEPLOY_DIR'
              docker compose -f docker-compose.prod.yml ps || true
              docker compose -f docker-compose.prod.yml logs --tail=120 api web caddy || true
            " || true
            exit 1
          fi

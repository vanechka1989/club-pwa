name: PWA device regression

on:
  push:
    branches:
      - main
  schedule:
    - cron: "20 21 * * *"
  workflow_dispatch:

concurrency:
  group: pwa-device-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium webkit
      - name: Run representative devices
        if: github.event_name != 'schedule'
        run: pnpm test:e2e
      - name: Run full device matrix nightly
        if: github.event_name == 'schedule'
        run: pnpm test:e2e:full
      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pwa-browser-failure-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-club}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-club}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-club} -d ${POSTGRES_DB:-club}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  uploads-permissions:
    image: club-pwa-api:latest
    restart: "no"
    user: "0:0"
    entrypoint: ["chown"]
    command: ["-R", "bun:bun", "/app/uploads"]
    volumes:
      - api-uploads:/app/uploads
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    read_only: true
    logging: *default-logging

  api:
    image: club-pwa-api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-club}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-club}
      WEB_ORIGIN: ${WEB_ORIGIN}
      OWNER_EMAIL: ${OWNER_EMAIL}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      AUTH_LOGIN_CODE_TTL_MINUTES: ${AUTH_LOGIN_CODE_TTL_MINUTES:-10}
      AUTH_SESSION_TTL_DAYS: ${AUTH_SESSION_TTL_DAYS:-30}
      AUTH_DEV_CODE_ENABLED: ${AUTH_DEV_CODE_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      DKIM_DOMAIN: ${DKIM_DOMAIN:-}
      DKIM_SELECTOR: ${DKIM_SELECTOR:-}
      DKIM_PRIVATE_KEY: ${DKIM_PRIVATE_KEY:-}
      MAILING_UNSUBSCRIBE_SECRET: ${MAILING_UNSUBSCRIBE_SECRET:-}
      OBSERVABILITY_TOKEN: ${OBSERVABILITY_TOKEN:-}
      WEB_PUSH_PUBLIC_KEY: ${WEB_PUSH_PUBLIC_KEY:-}
      WEB_PUSH_PRIVATE_KEY: ${WEB_PUSH_PRIVATE_KEY:-}
      WEB_PUSH_SUBJECT: ${WEB_PUSH_SUBJECT:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      S3_SIGNED_URL_TTL_SECONDS: ${S3_SIGNED_URL_TTL_SECONDS:-3600}
      REDIS_URL: ${REDIS_URL:-}
      RUN_BACKGROUND_JOBS: ${RUN_BACKGROUND_JOBS:-true}
      UPLOADS_DIR: /app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      uploads-permissions:
        condition: service_completed_successfully
    volumes:
      - api-uploads:/app/uploads
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "bun", "-e", "const response = await fetch('http://127.0.0.1:3000/ready'); process.exit(response.ok ? 0 : 1)"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging: *default-logging

  migrate:
    image: club-pwa-api:latest
    restart: "no"
    working_dir: /app/apps/api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-club}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-club}
      WEB_ORIGIN: ${WEB_ORIGIN}
      OWNER_EMAIL: ${OWNER_EMAIL}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      AUTH_LOGIN_CODE_TTL_MINUTES: ${AUTH_LOGIN_CODE_TTL_MINUTES:-10}
      AUTH_SESSION_TTL_DAYS: ${AUTH_SESSION_TTL_DAYS:-30}
      AUTH_DEV_CODE_ENABLED: ${AUTH_DEV_CODE_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      DKIM_DOMAIN: ${DKIM_DOMAIN:-}
      DKIM_SELECTOR: ${DKIM_SELECTOR:-}
      DKIM_PRIVATE_KEY: ${DKIM_PRIVATE_KEY:-}
      MAILING_UNSUBSCRIBE_SECRET: ${MAILING_UNSUBSCRIBE_SECRET:-}
      OBSERVABILITY_TOKEN: ${OBSERVABILITY_TOKEN:-}
      WEB_PUSH_PUBLIC_KEY: ${WEB_PUSH_PUBLIC_KEY:-}
      WEB_PUSH_PRIVATE_KEY: ${WEB_PUSH_PRIVATE_KEY:-}
      WEB_PUSH_SUBJECT: ${WEB_PUSH_SUBJECT:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      S3_SIGNED_URL_TTL_SECONDS: ${S3_SIGNED_URL_TTL_SECONDS:-3600}
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["bun"]
    command: ["node_modules/drizzle-kit/bin.cjs", "migrate"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    logging: *default-logging

  web:
    image: club-pwa-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "8080"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    logging: *default-logging

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    logging: *default-logging

volumes:
  postgres-data:
  api-uploads:
  caddy-data:
  caddy-config:

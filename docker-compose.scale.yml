x-api-environment: &api-environment
  NODE_ENV: production
  PORT: 3000
  DATABASE_URL: postgres://${POSTGRES_USER:-club}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-club}
  REDIS_URL: redis://redis:6379
  WEB_ORIGIN: ${WEB_ORIGIN}
  OWNER_EMAIL: ${OWNER_EMAIL}
  ADMIN_EMAILS: ${ADMIN_EMAILS:-}
  AUTH_LOGIN_CODE_TTL_MINUTES: ${AUTH_LOGIN_CODE_TTL_MINUTES:-10}
  AUTH_SESSION_TTL_DAYS: ${AUTH_SESSION_TTL_DAYS:-30}
  AUTH_DEV_CODE_ENABLED: ${AUTH_DEV_CODE_ENABLED:-false}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_FROM: ${SMTP_FROM:-}
  DKIM_DOMAIN: ${DKIM_DOMAIN:-}
  DKIM_SELECTOR: ${DKIM_SELECTOR:-}
  DKIM_PRIVATE_KEY: ${DKIM_PRIVATE_KEY:-}
  MAILING_UNSUBSCRIBE_SECRET: ${MAILING_UNSUBSCRIBE_SECRET:-}
  OBSERVABILITY_TOKEN: ${OBSERVABILITY_TOKEN:-}
  WEB_PUSH_PUBLIC_KEY: ${WEB_PUSH_PUBLIC_KEY:-}
  WEB_PUSH_PRIVATE_KEY: ${WEB_PUSH_PRIVATE_KEY:-}
  WEB_PUSH_SUBJECT: ${WEB_PUSH_SUBJECT:-}
  S3_ENDPOINT: ${S3_ENDPOINT:-}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_BUCKET: ${S3_BUCKET:-}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
  S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
  S3_SIGNED_URL_TTL_SECONDS: ${S3_SIGNED_URL_TTL_SECONDS:-3600}
  UPLOADS_DIR: /app/uploads

x-api-service: &api-service
  image: club-pwa-api:latest
  build:
    context: .
    dockerfile: apps/api/Dockerfile
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    pgbouncer:
      condition: service_healthy
    redis:
      condition: service_healthy
    uploads-permissions:
      condition: service_completed_successfully
  volumes:
    - api-uploads:/app/uploads
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp
  expose:
    - "3000"
  healthcheck:
    test: ["CMD", "bun", "-e", "const response = await fetch('http://127.0.0.1:3000/ready'); process.exit(response.ok ? 0 : 1)"]
    interval: 10s
    timeout: 5s
    retries: 10

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-club}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-club}
    command: ["postgres", "-c", "max_connections=100", "-c", "shared_buffers=512MB", "-c", "effective_cache_size=4GB"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-club} -d ${POSTGRES_DB:-club}"]
      interval: 10s
      timeout: 5s
      retries: 10

  uploads-permissions:
    image: club-pwa-api:latest
    restart: "no"
    user: "0:0"
    entrypoint: ["chown"]
    command: ["-R", "bun:bun", "/app/uploads"]
    volumes:
      - api-uploads:/app/uploads
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    read_only: true

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-club}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-club}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 300
      DEFAULT_POOL_SIZE: 40
      RESERVE_POOL_SIZE: 10
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-club} -d ${POSTGRES_DB:-club}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-1:
    <<: *api-service
    environment:
      <<: *api-environment
      RUN_BACKGROUND_JOBS: false

  api-2:
    <<: *api-service
    environment:
      <<: *api-environment
      RUN_BACKGROUND_JOBS: false

  worker:
    <<: *api-service
    environment:
      <<: *api-environment
      RUN_BACKGROUND_JOBS: true

  migrate:
    image: club-pwa-api:latest
    restart: "no"
    environment:
      <<: *api-environment
      DATABASE_URL: postgres://${POSTGRES_USER:-club}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-club}
      RUN_BACKGROUND_JOBS: false
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["pnpm"]
    command: ["--filter", "@club/api", "db:migrate"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

  web:
    image: club-pwa-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
    expose:
      - "8080"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
    depends_on:
      - web
      - api-1
      - api-2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile.scale:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  api-uploads:
  caddy-data:
  caddy-config:
